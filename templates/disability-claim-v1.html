<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">

<style>
  @page {
    size: A4;
    margin: 0;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  }

  .page {
    position: relative;
    width: 210mm;
    height: 297mm;
  }

  .bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 210mm;
    height: 297mm;
    z-index: 0;
  }

  .field {
    position: absolute;
    font-size: 8.5pt;
    z-index: 1;
    white-space: nowrap;
    line-height: 1;
  }
</style>
</head>

<body>
<div class="page">

  <!-- 배경 -->
  <img class="bg" src="{{backgroundImage}}" />

  <!-- 🔥 fieldMap 기반 렌더링 -->
  {{#each fields}}
    <div
      class="field"
      style="top: {{y}}mm; left: {{x}}mm;"
    >
      {{value}}
    </div>
  {{/each}}

</div>
</body>
</html>
