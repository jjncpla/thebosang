name: PR Validation

# 정적 점검 — secret 불필요, 즉시 작동
# PR open/synchronize 시 + main push 시 자동 실행
# lint, build, .env 커밋 감지, 환경변수 노출 감지, 실주민번호 패턴 감지

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint + TypeScript/Next Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prisma generate + Next build
        run: npm run build
        env:
          # 빌드 단계는 schema만 읽어서 generate. 실제 DB 연결 안 함.
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          AUTH_SECRET: ci_dummy_secret_for_build_validation_do_not_use_in_runtime
          AUTH_URL: http://localhost:3000

  security-grep:
    name: 보안 정적 점검
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: .env 파일 git 추적 감지
        run: |
          if git ls-files | grep -E '^\.env(\..+)?$' | grep -v '^\.env\.example$'; then
            echo "::error::.env 파일이 git에 커밋되어 있습니다. .gitignore 확인 후 git rm --cached로 제거하세요."
            exit 1
          fi
          echo "✓ .env 파일 git 추적 없음"

      - name: 클라이언트 컴포넌트의 비공개 env 노출 감지
        run: |
          # "use client" 마크된 파일에서 NEXT_PUBLIC_ 외 env 참조 감지
          violations=0
          while IFS= read -r file; do
            if head -5 "$file" | grep -q '"use client"'; then
              if grep -nE 'process\.env\.[A-Z_]+' "$file" | grep -vE 'NEXT_PUBLIC_|NODE_ENV'; then
                echo "::warning file=$file::비공개 env가 클라이언트 컴포넌트에서 참조됨. NEXT_PUBLIC_ 접두사만 허용."
                violations=$((violations + 1))
              fi
            fi
          done < <(find components app -type f \( -name '*.tsx' -o -name '*.ts' \) 2>/dev/null)
          if [ $violations -gt 0 ]; then
            echo "::error::클라이언트 코드에 비공개 환경변수 노출 의심 파일 $violations 건. 수동 검토 필요."
            exit 1
          fi
          echo "✓ 클라이언트 컴포넌트 env 노출 없음"

      - name: 실주민번호 형식 패턴 감지
        run: |
          # 6자리-7자리 패턴 검색. 명백한 더미(990101, 111111, 123456, 000000)는 제외.
          # 실제 주민번호처럼 보이는 패턴이 있으면 경고.
          matches=$(grep -rEn '\b[0-9]{6}-[1-4][0-9]{6}\b' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' --include='*.json' \
            . 2>/dev/null \
            | grep -vE '(990101|111111|123456|000000|tests?/|fixtures?/|seed)' || true)
          if [ -n "$matches" ]; then
            echo "::warning::실주민번호 형식 패턴 감지. 더미가 아니면 즉시 제거 필요:"
            echo "$matches" | head -20
          else
            echo "✓ 실주민번호 형식 패턴 없음"
          fi

      - name: package.json 변경 감지 (PR만)
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -q '^package.json$'; then
            echo "::warning::package.json 변경 감지됨. 신규 패키지 추가 시 사용자 컨펌 필요 (CLAUDE.md 절대 원칙)."
          fi
